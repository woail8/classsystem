server:
  port: 8080

spring:
  application:
    name: campus-learning-server
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/campus_learning?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  web:
    resources:
      static-locations: classpath:/static/
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

campus:
  jwt:
    secret: campus-learning-demo-secret-key-for-server-2026
    expire-hours: 12
  file:
    upload-path: ./server-data/uploads

logging:
  level:
    root: info
