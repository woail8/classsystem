server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: campus-learning-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/campus_learning?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  web:
    resources:
      static-locations: classpath:/static/
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

campus:
  jwt:
    secret: ${CAMPUS_JWT_SECRET:campus-learning-demo-secret-key-for-server-2026}
    expire-hours: ${CAMPUS_JWT_EXPIRE_HOURS:12}
  file:
    upload-path: ${CAMPUS_FILE_UPLOAD_PATH:./server-data/uploads}

logging:
  level:
    root: info
